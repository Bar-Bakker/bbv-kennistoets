<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>BBV Kennistoets</title>

  <style>
    :root{
      --je-pink:#e6005c; --je-pink-dark:#8b002f; --bg:#0f172a; --card:#1e293b;
      --text:#fff; --muted:rgba(255,255,255,.75); --border:rgba(255,255,255,.15);
      --good:#22c55e; --bad:#ef4444;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif;
      background:
        radial-gradient(900px 650px at 20% 0%,rgba(230,0,92,.25),transparent 60%),
        radial-gradient(900px 650px at 90% 20%,rgba(139,0,47,.25),transparent 55%),
        var(--bg);
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
    }

    .wrap{width:100%;max-width:560px}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .titles h1{margin:0;font-size:20px;font-weight:900}
    .titles small{color:var(--muted)}

    .card{
      background:rgba(30,41,59,.92);
      border:1px solid var(--border);
      border-radius:18px;
      padding:16px;
    }

    /* ===== STARTSCHERM ===== */
    .start{
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
    }

    .logoWrap{
      width:100%;
      display:flex;
      justify-content:center;
      margin:20px 0 10px;
    }

    .logoCard{
      background:#fff;
      padding:26px 30px;
      border-radius:18px;
      box-shadow:
        0 18px 40px rgba(0,0,0,.35),
        0 2px 6px rgba(0,0,0,.2);
    }

    .logoCard img{
