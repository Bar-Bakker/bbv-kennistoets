<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>BBV Kennistoets</title>
  <style>
    :root{
      --je-pink: #e6005c;
      --je-pink-dark: #8b002f;
      --bg: #0f172a;
      --card: #1e293b;
      --text: #ffffff;
      --muted: rgba(255,255,255,.75);
      --border: rgba(255,255,255,.15);
      --good: #22c55e;
      --bad: #ef4444;
      --gold: #f7c948;
      --gold-dark: #b88700;
    }

    * { box-sizing: border-box; }

    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(800px 600px at 20% 0%, rgba(230,0,92,.25), transparent 60%),
        radial-gradient(800px 600px at 90% 20%, rgba(139,0,47,.25), transparent 55%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:16px;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .wrap{ width:100%; max-width:520px; position:relative; }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:12px;
      gap: 10px;
    }

    .titles h1{ margin:0; font-size:20px; font-weight:800; }
    .titles small{ color:var(--muted); }

    .coins{
      background: linear-gradient(135deg, var(--je-pink), var(--je-pink-dark));
      padding:8px 12px;
      border-radius:999px;
      font-weight:800;
      display:flex;
      align-items:center;
      gap:8px;
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,.12);
    }

    /* iPhone-safe “coin” icoon (geen emoji) */
    .coinDot{
      width: 16px;
      height: 16px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, #fff3, transparent 45%),
                  linear-gradient(135deg, var(--gold), var(--gold-dark));
      border: 1px solid rgba(255,255,255,.25);
      box-shadow: 0 2px 10px rgba(0,0,0,.25);
      flex: 0 0 auto;
    }

    .card{
      background: rgba(30,41,59,.92);
      border:1px solid var(--border);
      border-radius:18px;
      padding:16px;
    }

    .top{
      display:flex;
      justify-content:space-between;
      font-size:14px;
      color:var(--muted);
      margin-bottom:8px;
      gap: 10px;
      flex-wrap: wrap;
    }

    .question{ font-size:18px; font-weight:700; margin:12px 0; }

    .option{
      background:var(--card);
      border:1px solid var(--border);
      padding:12px;
      border-radius:12px;
      cursor:pointer;
      margin-bottom:10px;
      user-select:none;
    }

    .option.correct{
      background:rgba(34,197,94,.2);
      border-color:var(--good);
    }

    .option.wrong{
      background:rgba(239,68,68,.2);
      border-color:var(--bad);
    }

    .btn{
      margin-top:12px;
      padding:12px;
      text-align:center;
      border-radius:12px;
      font-weight:800;
      cursor:pointer;
      user-select:none;
      background: linear-gradient(135deg, var(--je-pink), var(--je-pink-dark));
      border: 1px solid rgba(255,255,255,.12);
    }

    .hidden{ display:none; }

    .result{ text-align:center; }
    .result .score{ font-size:32px; font-weight:900; color:var(--je-pink); margin: 10px 0; }
    .bonusLine{ margin-top: 6px; color: rgba(255,255,255,.85); font-weight: 700; }

    /* +5 munten animatie */
    .coinPopLayer{
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 9999;
    }

    .coinPop{
      position: absolute;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 999px;
      font-weight: 900;
      background: rgba(0,0,0,.25);
      border: 1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      transform: translate3d(0,0,0);
      animation: floatUp 900ms ease-out forwards;
    }

    .coinPop .coinDot{ width: 18px; height: 18px; }
    .coinPop .text{ color: #fff; letter-spacing: .2px; }

    @keyframes floatUp{
      0%   { opacity: 0; transform: translate3d(0, 14px, 0) scale(.96); }
      15%  { opacity: 1; transform: translate3d(0, 0, 0) scale(1); }
      85%  { opacity: 1; transform: translate3d(0, -34px, 0) scale(1); }
      100% { opacity: 0; transform: translate3d(0, -48px, 0) scale(1.02); }
    }

    /* subtiele “pulse” op muntenbadge bij toename */
    .pulse{ animation: pulse 320ms ease-out; }
    @keyframes pulse{
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>
<div class="coinPopLayer" id="coinPopLayer"></div>

<div class="wrap">
  <div class="header">
    <div class="titles">
      <h1>BBV Kennistoets</h1>
      <small>JE Consultancy</small>
    </div>
    <div class="coins" id="coinsBadge"><span class="coinDot" aria-hidden="true"></span> Munten: <span id="coins">0</span></div>
  </div>

  <div class="card">
    <div class="top">
      <div>Vraag <span id="qIndex">1</span>/<span id="qTotal">1</span></div>
      <div>Score: <span id="score">0</span></div>
    </div>

    <div id="quiz">
      <div id="question" class="question"></div>
      <div id="options"></div>
      <div id="next" class="btn hidden">Volgende</div>
    </div>

    <div id="result" class="result hidden">
      <p class="score" id="percent">0%</p>
      <p id="status"></p>
      <p>Munten verdiend: <strong id="finalCoins"></strong></p>
      <p class="bonusLine hidden" id="bonusLine"></p>
      <div class="btn" onclick="start()">Opnieuw</div>
    </div>
  </div>
</div>

<script>
  const PASS_PERCENT = 70;
  const COINS_PER_GOOD = 5;
  const BONUS_COINS_100 = 20; // bonus als alles goed is

  const QUESTIONS = [
    { question:"Wanneer mag er een mutatie aan een bestemmingsreserve plaatsvinden, die niet geraamd is?",
      options:["a) Nooit, want dat is onrechtmatig","b) Als daar een gegronde reden voor is","c) Als de raad hiervan op de hoogte is gesteld","d) Alleen via een raadsbesluit"], correct:2 },
    { question:"Voor vakantiegeld waarvoor je over het lopend jaar per 31 december nog een verplichting hebt (juni–december)",
      options:["a) Moet je een voorziening treffen","b) Mag je een voorziening treffen","c) Mag je géén voorziening treffen"], correct:2 },
    { question:"Op grond van het BBV is tussentijdse winstname vanuit grondexploitaties",
      options:["a) Niet toegestaan","b) Toegestaan bij voldoende zekerheid","c) Verplicht bij zekerheid","d) Geen van bovenstaande"], correct:1 },
    { question:"Het is niet toegestaan rente bij te schrijven op niet in exploitatie genomen gronden.",
      options:["a) Juist","b) Onjuist","c) Ik weet het niet"], correct:1 }
  ];

  let questions=[], current=0, score=0, coins=0, answered=false;

  const qEl = document.getElementById('question');
  const optEl = document.getElementById('options');
  const nextBtn = document.getElementById('next');
  const qIdx = document.getElementById('qIndex');
  const qTot = document.getElementById('qTotal');
  const scoreEl = document.getElementById('score');
  const coinEl = document.getElementById('coins');
  const coinsBadge = document.getElementById('coinsBadge');
  const coinPopLayer = document.getElementById('coinPopLayer');
  const bonusLine = document.getElementById('bonusLine');

  function shuffle(a){
    for(let i=a.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
  }

  function start(){
    questions = shuffle([...QUESTIONS]);
    current=0; score=0; coins=0; answered=false;
    qTot.textContent=questions.length; scoreEl.textContent=0; coinEl.textContent=0;
    document.getElementById('quiz').classList.remove('hidden');
    document.getElementById('result').classList.add('hidden');
    bonusLine.classList.add('hidden');
    bonusLine.textContent='';
    load();
  }

  function load(){
    answered=false;
    nextBtn.classList.add('hidden');
    optEl.innerHTML='';
    const q = questions[current];
    qEl.textContent=q.question;
    qIdx.textContent=current+1;
    q.options.forEach((t,i)=>{
      const d=document.createElement('div');
      d.className='option';
      d.textContent=t;
      d.onclick=()=>select(i,d);
      optEl.appendChild(d);
    });
  }

  function showCoinPop(amount){
    // Plaats de animatie nabij de muntenbadge (bovenin rechts)
    const badgeRect = coinsBadge.getBoundingClientRect();
    const x = Math.max(12, badgeRect.left + badgeRect.width/2 - 60);
    const y = Math.max(12, badgeRect.top + badgeRect.height + 6);

    const pop = document.createElement('div');
    pop.className = 'coinPop';
    pop.style.left = x + 'px';
    pop.style.top  = y + 'px';

    const dot = document.createElement('span');
    dot.className = 'coinDot';
    dot.setAttribute('aria-hidden','true');

    const txt = document.createElement('span');
    txt.className = 'text';
    txt.textContent = '+' + amount + ' munten';

    pop.appendChild(dot);
    pop.appendChild(txt);
    coinPopLayer.appendChild(pop);

    // pulse op badge
    coinsBadge.classList.remove('pulse');
    void coinsBadge.offsetWidth; // reflow
    coinsBadge.classList.add('pulse');

    pop.addEventListener('animationend', ()=>{
      if(pop && pop.parentNode) pop.parentNode.removeChild(pop);
    });
  }

  function select(i,el){
    if(answered) return;
    answered=true;

    const q=questions[current];
    const all=document.querySelectorAll('.option');
    for(let o of all){ o.onclick=null; }

    if(i===q.correct){
      el.classList.add('correct');
      score++;
      coins += COINS_PER_GOOD;
      showCoinPop(COINS_PER_GOOD);
    } else {
      el.classList.add('wrong');
      all[q.correct].classList.add('correct');
    }

    scoreEl.textContent=score;
    coinEl.textContent=coins;
    nextBtn.classList.remove('hidden');
  }

  nextBtn.onclick=()=>{
    current++;
    if(current<questions.length) load();
    else finish();
  };

  function finish(){
    const total = questions.length;
    const pct = Math.round((score/total)*100);

    // bonus bij 100%
    let bonus = 0;
    if(score === total && total > 0){
      bonus = BONUS_COINS_100;
      coins += bonus;
      coinEl.textContent = coins;
      bonusLine.textContent = '🎉 Bonus: +' + bonus + ' munten voor 100% score!';
      bonusLine.classList.remove('hidden');
      // ook een pop voor bonus
      showCoinPop(bonus);
    }

    document.getElementById('quiz').classList.add('hidden');
    document.getElementById('result').classList.remove('hidden');
    document.getElementById('percent').textContent = pct + '%';
    document.getElementById('status').textContent = pct>=PASS_PERCENT ? '✅ Geslaagd' : '❌ Onvoldoende';
    document.getElementById('finalCoins').textContent = coins;
  }

  start();
</script>
</body>
</html>
